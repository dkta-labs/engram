services:
  postgres:
    image: postgres:16-alpine
    container_name: engram-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: engram
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: engram
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./packages/api/sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U engram"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./packages/api
    container_name: engram-api
    restart: unless-stopped
    env_file: ./packages/api/.env
    ports:
      - "127.0.0.1:3099:3000"
    volumes:
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
