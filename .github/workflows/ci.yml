name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Checks only. Engram does NOT deploy itself and needs no VPS SSH secrets.
# All deploys go through dkta-labs/infra -> deploy-infra.yml -> the self-hosted
# VPS runner -> deploy_vps_service.sh -> engram's deploy/deploy.sh (which builds
# the API image and publishes the static web to /opt/engram-web).
jobs:
  test:
    name: Lint, typecheck & test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      # packages/api is plain JS (ESM, `node --test`); no tsconfig or build
      # script. SDK is TypeScript; web is Astro.
      - name: Typecheck SDK
        run: npx tsc --noEmit
        working-directory: packages/sdk

      - name: Build SDK
        run: npm run build --workspace=packages/sdk

      - name: Build Web
        run: npm run build --workspace=packages/web

      - name: Test contracts
        run: npx hardhat test
        working-directory: packages/contracts
