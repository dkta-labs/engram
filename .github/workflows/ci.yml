name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Lint, typecheck & test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Typecheck API
        run: npx tsc --noEmit
        working-directory: packages/api

      - name: Typecheck SDK
        run: npx tsc --noEmit
        working-directory: packages/sdk

      - name: Build API
        run: npm run build --workspace=packages/api

      - name: Build SDK
        run: npm run build --workspace=packages/sdk

      - name: Build Web
        run: npm run build --workspace=packages/web

      - name: Test contracts
        run: npx hardhat test
        working-directory: packages/contracts

  deploy:
    name: Deploy API
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: bash /home/hermes/engram/deploy.sh
          script_stop: true
          timeout: 300s

      - name: Verify deployment
        run: |
          sleep 5
          STATUS=$(curl -sf https://engram.dkta.dev/v1/health | python3 -c "import sys,json; print(json.load(sys.stdin)['status'])")
          if [ "$STATUS" != "ok" ]; then
            echo "Health check failed: $STATUS"
            exit 1
          fi
          echo "Deployment verified: $STATUS"

  deploy-web:
    name: Deploy Web
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Build web
        run: npm run build --workspace=packages/web

      - name: Deploy static files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "packages/web/dist/*"
          target: "/opt/engram-web/"
          strip_components: 3
          overwrite: true
