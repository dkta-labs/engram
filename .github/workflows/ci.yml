name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Lint, typecheck & test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      # packages/api is plain JS (ESM, `node --test`) deployed via infra
      # (deploy-infra.yml -> deploy_vps_service.sh -> deploy/deploy.sh); it has
      # no tsconfig or build script. SDK is TypeScript; web is Astro.
      - name: Typecheck SDK
        run: npx tsc --noEmit
        working-directory: packages/sdk

      - name: Build SDK
        run: npm run build --workspace=packages/sdk

      - name: Build Web
        run: npm run build --workspace=packages/web

      - name: Test contracts
        run: npx hardhat test
        working-directory: packages/contracts

  deploy-web:
    name: Deploy Web
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Build web
        run: npm run build --workspace=packages/web

      - name: Deploy static files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "packages/web/dist/*"
          target: "/opt/engram-web/"
          strip_components: 3
          overwrite: true
