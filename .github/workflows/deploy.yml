name: Trigger deploy

on:
  push:
    branches: [main]

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch to infra
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.INFRA_DISPATCH_TOKEN }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: 'dkta0',
              repo: 'infra',
              event_type: 'deploy-engram',
              client_payload: { ref: context.sha }
            });
