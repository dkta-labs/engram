# Engram no longer deploys itself.
# All deploys go through dkta0/infra → deploy-infra.yml → deploy_vps_service.sh → deploy/deploy.sh
# This file is intentionally a no-op. CI checks only.
name: CI
on:
  pull_request:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker compose build api
